services:
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    container_name: streaming_asr_web
    env_file: ../.env
    ports:
      - "${PORT:-8000}:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
